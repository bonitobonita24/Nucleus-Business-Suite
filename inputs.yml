##############################################################################
# inputs.yml — Nucleus Business Suite — V10 Spec File
# Version: 3
# Generated: 2026-03-15 by CLAUDE_CODE (Phase 3)
# DO NOT EDIT THIS FILE DIRECTLY — it is agent-owned.
# To change anything: edit docs/PRODUCT.md, then run Phase 7.
##############################################################################

version: 3

app:
  name: "Nucleus Business Suite"
  slug: "nucleus-business-suite"
  owner: "Powerbyte"
  description: "Multi-tenant ERP SaaS for SME IT services and product businesses"
  port: 3000

environments:
  - dev
  - stage
  - prod

domains:
  dev: "http://localhost:3000"
  stage: "https://staging.erp.powerbyte.app"
  prod: "https://erp.powerbyte.app"

# ─────────────────────────────────────────────────────────────
# TENANCY
# ─────────────────────────────────────────────────────────────
tenancy:
  mode: multi
  strategy: schema_per_tenant       # LOCKED — separate PostgreSQL schema per tenant
  routing: subdirectory             # path-based: /<slug>/erp, /<slug>/pos, /<slug>/portal
  schema_prefix: "t_"               # schema name: t_<slug_underscored>
  global_schema: public             # platform-level tables live here
  notes:
    - "NO tenantId column on any ERP entity — schema IS the isolation boundary"
    - "No PostgreSQL RLS policies on tenant entities — schema boundary replaces RLS"
    - "Prisma middleware sets search_path atomically per request from JWT tenantSlug"
    - "Migration runner iterates all active schemas sequentially"
    - "Failed migrations per tenant logged and retried independently"
    - "Schema never auto-dropped — manually dropped by platform_owner after retention period"

# ─────────────────────────────────────────────────────────────
# APPS
# ─────────────────────────────────────────────────────────────
apps:
  - name: web
    framework: nextjs
    port: 3000
    description: >
      Unified Next.js app — ERP, POS, Customer Portal, and Powerbyte Admin
      all in one app. Next.js route groups handle all routing internally.
      No nginx, no separate deployables.
    route_groups:
      - group: public
        patterns: ["/", "/login", "/register"]
        auth_required: false
      - group: admin
        patterns: ["/powerbyte-admin/*"]
        roles: [platform_owner]
      - group: erp
        patterns: ["/:slug/erp/*"]
        roles:
          [
            tenant_super_admin,
            admin,
            accountant,
            hr_manager,
            project_manager,
            budget_holder,
            sales_staff,
            purchasing_staff,
            inventory_staff,
            support_agent,
          ]
        note: "tenantSlug in JWT must match :slug in URL; cross-tenant path → 403"
      - group: pos
        patterns: ["/:slug/pos/*"]
        roles: [cashier, admin, tenant_super_admin]
      - group: portal
        patterns: ["/:slug/portal/*"]
        roles: [customer]
    access_control:
      suspended_tenant: "suspension screen on all routes; mobile sessions invalidated"
      cross_tenant: "valid session on wrong :slug → 403"
      platform_owner_on_tenant_path: "403"

  - name: worker
    framework: bullmq
    description: >
      BullMQ runtime worker process — all 17 queues handled by one shared
      worker. tenantSlug present in every job payload. Prisma switches
      search_path per job execution.
    source: apps/worker
    job_definitions: packages/jobs

  - name: mobile
    framework: expo
    workflow: managed
    platforms: [ios, android]
    distribution: internal              # APK + IPA via MDM or direct install; NOT App Store
    description: "Field companion app — offline-first DTR, tasks, expenses, payslips"
    offline_first: true
    offline_features:
      - dtr_clock_in_out               # fully offline; native GPS; WatermelonDB; auto-sync
      - task_viewing_and_status_updates # offline; synced on reconnect; server wins on conflict
      - payslip_and_leave_cache        # last-fetched cached; "showing cached data" notice offline
      - expense_submission             # form offline; receipt photo stored locally; upload on reconnect
    offline_storage: watermelondb
    push_notifications:
      enabled: true
      provider: expo_push              # FCM + APNs
      events:
        - task_assigned
        - task_status_updated          # notifies creator
        - attendance_approved_or_rejected
        - leave_request_approved_or_rejected
        - expense_approved_or_rejected
        - payroll_released
        - low_stock_alert              # admin + inventory_staff
        - cost_change_alert            # admin
        - customer_credit_balance_changed # sales_staff + accountant
        - excess_payment_decision_required # sales_staff
    deep_linking:
      enabled: true
      routes:
        - notification: task_assigned
          screen: task_detail
        - notification: attendance_approved_or_rejected
          screen: attendance_record
        - notification: expense_approved_or_rejected
          screen: expense_record
        - notification: payroll_released
          screen: payslips
        - notification: customer_credit_balance_changed
          screen: customer_credit_tab
    native_features:
      gps:
        purpose: "DTR clock-in/out; works fully offline; native device GPS"
      camera:
        purpose: "Expense receipt photo capture"
      biometrics:
        optional: true
        purpose: "App unlock only — NOT for authentication (Auth.js session handles auth)"
    roles_with_access: [staff, project_manager, hr_manager, admin, tenant_super_admin]
    api: packages/api-client            # mobile NEVER accesses packages/db directly

# ─────────────────────────────────────────────────────────────
# PACKAGES
# ─────────────────────────────────────────────────────────────
packages:
  - name: shared
    description: "TypeScript interfaces + Zod schemas for all entities (global + tenant)"
  - name: api-client
    description: "Typed tRPC client — used by all apps; never by packages/db or workers directly"
  - name: db
    description: >
      Prisma schema (two schema files: public + tenant), migrations, typed
      repositories, seed. Handles search_path switching middleware.
  - name: ui
    description: >
      shadcn/ui + Tailwind CSS (web components);
      React Native Reusables + NativeWind (mobile components)
  - name: jobs
    description: "BullMQ typed queue definitions + job payload types — 17 named queues"
  - name: storage
    description: "Typed MinIO/R2 wrapper (S3-compatible client abstraction)"

# ─────────────────────────────────────────────────────────────
# AUTH
# ─────────────────────────────────────────────────────────────
auth:
  provider: authjs_v5               # Auth.js (NextAuth v5)
  session_strategy: jwt
  jwt_tenant:
    fields: [userId, tenantSlug, role, isEmployee]
    note: "role is a single string enum — one role per user always"
  jwt_platform:
    fields: [userId, role, tenantSlug]
    platform_owner_tenant_slug: null
  password_hashing: bcrypt          # Auth.js default
  csrf:
    web: samesite_strict_cookies
    mobile: jwt_authorization_header  # CSRF not applicable to mobile
  session_invalidation:
    suspended_tenant: "all web sessions and mobile JWTs invalidated immediately on suspension"
    tenant_scope: "session valid only for own /<slug>/* path"

# ─────────────────────────────────────────────────────────────
# ROLES
# ─────────────────────────────────────────────────────────────
roles:
  model: single_role_per_user       # strictly one role per user — no multi-role
  enforcement: typescript_enum      # RBAC enforced via code; Role entity is read-only reference
  role_entity_purpose: reference_table  # seeded at migration; tenants cannot edit

  is_employee_flag:
    meaning: "user has linked Employee record AND is permitted to use the mobile app"
    sync: "toggling isEmployee = true always creates/links Employee record atomically"

  platform:
    - name: platform_owner
      description: "Powerbyte super admin — manage tenants, plans, billing, DLQ replay; zero tenant ERP access"
      mobile_access: false

  tenant:
    - name: tenant_super_admin
      description: "Full access all ERP modules; assign any role; approve attendance; allocate budgets; manage customer credit"
      mobile_access: true
      is_employee: true
    - name: admin
      description: "Full operational ERP access; assign any role except tenant_super_admin; approve attendance; manage credit; cannot delete core records"
      mobile_access: true
      is_employee: true
    - name: accountant
      description: "Accounting, Banking, Invoices, Payments, Expenses, Payroll; allocate budgets; manage customer credit; read-only elsewhere"
      mobile_access: false
      is_employee: true
    - name: hr_manager
      description: "HR, Attendance, Leave, Cash Advances, Payroll, Banking; create/manage staff users only; higher role assignments require admin+"
      mobile_access: true
      is_employee: true
    - name: project_manager
      description: "Projects, Tasks, Milestones, Time Logs, ProjectExpenses, Banking; approve on-site attendance for own projects; assign tasks to any user; generate project invoices"
      mobile_access: true
      is_employee: true
    - name: budget_holder
      description: "Log expenses against own allocation; view own balance and spend history; cannot see other users' data"
      mobile_access: false
      is_employee: true
    - name: sales_staff
      description: "Proposals, Invoices, Subscriptions, Customers; record payments; manage customer credit; apply credit to invoices; handle excess decisions; process credit refunds; no HR/Banking/Accounting"
      mobile_access: false
      is_employee: true
    - name: purchasing_staff
      description: "POs, Vendors, Goods Receipt, Shipping, Expenses; fund source selection; read-only Inventory"
      mobile_access: false
      is_employee: true
    - name: inventory_staff
      description: "Products, Stock, Warehouses, Purchase History; read-only Purchasing"
      mobile_access: false
      is_employee: true
    - name: staff
      description: "Task Dashboard on login; DTR clock-in/out; own tasks and todos only; no financial access"
      mobile_access: true
      is_employee: true
    - name: cashier
      description: "POS Terminal + Task Dashboard only; fund source per session; no back-office access"
      mobile_access: false
      is_employee: true
    - name: support_agent
      description: "Support Tickets full access; read-only on Customer and Projects; Task Dashboard"
      mobile_access: false
      is_employee: false   # may or may not be on payroll — not assumed
    - name: customer
      description: "Portal only — own Invoices (with Payment History and Credit Balance), Proposals, Project status, Tickets; sees own credit balance only — never the internal creditLimit"
      mobile_access: false
      is_employee: false

# ─────────────────────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────────────────────
database:
  engine: postgresql
  connection_pooling: pgbouncer     # per-tenant connection limits (L4)
  schema_strategy: schema_per_tenant  # LOCKED
  global_schema: public
  tenant_schema_prefix: "t_"
  slug_transform: "replace hyphens with underscores"  # t_my_tenant

  global_entities:
    - Tenant          # id, tenantName(slug), companyName, ownerEmail, ownerName, planId, status, trialEndsAt, schemaName, createdAt
    - Plan            # id, name[Starter|Growth|Pro|Enterprise], monthlyPrice, annualPrice, "features[]", maxUsers, maxStorageGB, isActive, createdAt
    - TenantSubscription  # id, tenantId, planId, billingCycle, currentPeriodStart, currentPeriodEnd, status
    - TenantInvoice   # id, tenantId, subscriptionId, amount, status, dueDate, paidAt, generatedAt
    - TenantPayment   # id, tenantInvoiceId, amount, method, referenceNo, paidAt, recordedBy
    - TenantAuditLog  # id, tenantId, action, performedBy, notes, createdAt

  tenant_entities:
    auth_users:
      - name: User
        fields: [id, name, email, password, role, departmentId, isEmployee, isActive, createdAt]
        note: "role is single string enum; isEmployee gates Employee record + mobile access"
      - name: Role
        fields: [id, name, "permissions[]"]
        note: "read-only reference table; seeded at migration; not editable by tenants"
      - name: Department
        fields: [id, name]
      - name: AuditLog
        fields: [id, userId, action, module, recordId, timestamp]
        note: "immutable — never updated or deleted"

    crm_sales:
      - name: Customer
        fields: [id, companyName, contactPerson, email, phone, address, type, creditLimit, creditBalance, createdAt]
        note: "creditLimit: null=unlimited, 0=no credit facility, amount=specific limit"
      - name: CustomerCreditAccount
        fields: [id, customerId, totalCredited, totalUsed, totalRefunded, currentBalance, createdAt, updatedAt]
        note: "one per customer; auto-created when creditLimit > 0 first set; immutable ledger header; never deleted"
      - name: CustomerCreditTransaction
        fields: [id, customerId, type, amount, referenceType, referenceId, invoiceId, notes, performedBy, createdAt]
        enums:
          type: [advance_payment, excess_payment, credit_applied, credit_refunded]
          referenceType: [invoice, payment, manual_refund]
        note: "immutable ledger — never updated or deleted after creation"
      - name: Proposal
        fields: [id, customerId, "lineItems[]", terms, status, createdAt]
        enums:
          status: [draft, sent, revised, accepted, declined]
      - name: Invoice
        fields: [id, customerId, proposalId, projectId, subscriptionId, "lineItems[]", subtotal, tax, total, amountPaid, creditApplied, balance, status, fundSourceId, dueDate, createdAt]
        computed:
          balance: "total - amountPaid - creditApplied"
        enums:
          status: [draft, sent, unpaid, partially_paid, overdue, paid]
        status_transitions:
          - "amountPaid+creditApplied=0 → unpaid"
          - "0 < amountPaid+creditApplied < total → partially_paid"
          - "amountPaid+creditApplied=total → paid"
          - "past dueDate and balance>0 → overdue"
      - name: Payment
        fields: [id, invoiceId, amount, method, fundSourceId, referenceNo, balanceAfterPayment, excessAmount, excessHandling, notes, recordedBy, paidAt]
        enums:
          method: [cash, card, bank, gcash, other]
          excessHandling: [credited_to_account, refunded, pending_decision]
      - name: Subscription
        fields: [id, customerId, planId, billingCycle, nextBillingDate, descriptionTemplate, status]
        enums:
          billingCycle: [monthly, quarterly, annual]
          status: [active, paused, cancelled]
        notes: "descriptionTemplate supports {{month}} {{date}} {{year}} placeholders"

    purchasing:
      - name: Vendor
        fields: [id, type, name, createdAt]
        enums:
          type: [direct_supplier, ecommerce_seller]
      - name: DirectSupplier
        fields: [id, vendorId, companyOrPersonName, contactPerson, email, phone, address]
      - name: ECommerceSeller
        fields: [id, vendorId, platform, sellerName, profileUrl, createdAt]
        enums:
          platform: [shopee, lazada, zalora, fb_marketplace, other]
      - name: PurchaseOrder
        fields: [id, vendorId, "lineItems[]", subtotal, status, fundSourceId, expectedDate, approvedBy, approvedAt, createdAt]
        enums:
          status: [draft, sent, confirmed, partially_received, received, cancelled]
      - name: PurchaseOrderItem
        fields: [id, purchaseOrderId, productId, productName, quantity, unitCost, lineTotal, landedUnitCost]
        note: "landedUnitCost is computed (unitCost + shipping share)"
      - name: ShippingCost
        fields: [id, purchaseOrderId, logisticsProvider, amount, receiptPhotoUrl, notes, addedBy, createdAt]
      - name: GoodsReceipt
        fields: [id, purchaseOrderId, receivedBy, receivedAt, notes, "photos[]"]
      - name: GoodsReceiptItem
        fields: [id, goodsReceiptId, purchaseOrderItemId, productId, quantityReceived]
      - name: PurchaseInvoice
        fields: [id, purchaseOrderId, vendorInvoiceNo, amount, fundSourceId, status, dueDate, createdAt]
        enums:
          status: [unpaid, paid]
      - name: Expense
        fields: [id, category, amount, description, attachmentUrl, fundSourceId, submittedBy, status, createdAt]
        enums:
          status: [draft, approved, rejected]

    inventory:
      - name: Product
        fields: [id, name, sku, description, type, unitPrice, costPrice, stock, reorderLevel, categoryId, isActive, createdAt]
        enums:
          type: [physical, service]
      - name: Category
        fields: [id, name, parentId]
      - name: ProductPurchaseHistory
        fields: [id, productId, purchaseOrderId, vendorId, vendorName, vendorType, platform, quantityReceived, unitCost, shippingCostShare, landedUnitCost, receivedAt]
      - name: StockMovement
        fields: [id, productId, type, quantity, referenceType, referenceId, notes, createdAt]
        enums:
          type: [in, out, adjustment, transfer]
      - name: Warehouse
        fields: [id, name, location, isDefault]
      - name: WarehouseStock
        fields: [id, warehouseId, productId, quantity]

    projects:
      - name: Project
        fields: [id, customerId, name, description, budget, startDate, endDate, status, managerId, createdAt]
        enums:
          status: [draft, active, on_hold, completed, cancelled]
      - name: ProjectExpense
        fields: [id, projectId, budgetAllocationId, cashAdvanceId, category, amount, description, receiptUrl, fundSourceId, loggedBy, status, createdAt]
        enums:
          status: [draft, approved, rejected]
      - name: Milestone
        fields: [id, projectId, title, dueDate, isCompleted]
      - name: TimeLog
        fields: [id, projectId, taskId, userId, hours, description, loggedAt]

    tasks:
      - name: Task
        fields: [id, title, description, projectId, assignedTo, assignedBy, priority, status, dueDate, createdAt]
        enums:
          priority: [low, medium, high]
          status: [todo, in_progress, done, cancelled]
      - name: ToDo
        fields: [id, userId, title, isCompleted, dueDate, createdAt]

    dtr_attendance:
      - name: AttendanceRecord
        fields: [id, userId, date, clockInTime, clockInLat, clockInLng, clockInLocation, clockOutTime, clockOutLat, clockOutLng, workLocation, projectId, status, approvedBy, approvedAt, notes, isSyncedFromOffline, createdAt]
        enums:
          clockInLocation: [office, project_site]
          status: [pending, approved, rejected]
        note: "GPS fields nullable when unavailable"
      - name: Attendance
        fields: [id, employeeId, attendanceRecordId, date, hoursWorked, status]
        enums:
          status: [present, absent, late, half_day]

    budget:
      - name: BudgetAllocation
        fields: [id, allocatedTo, allocatedBy, amount, remainingBalance, projectId, generalCategory, fundSourceId, notes, status, createdAt]
        enums:
          status: [active, exhausted, revoked]

    banking:
      - name: FundSource
        fields: [id, type, name, institutionName, accountNumber, currentBalance, creditLimit, outstandingBalance, isActive, createdAt]
        enums:
          type: [cash_on_hand, e_wallet, bank, credit_card]
        note: "creditLimit and outstandingBalance relevant for credit_card type"
      - name: FundTransaction
        fields: [id, fundSourceId, type, amount, referenceType, referenceId, description, balanceAfter, createdBy, createdAt]
        enums:
          type: [credit, debit]
      - name: CreditCardPayment
        fields: [id, creditCardFundSourceId, paidFromFundSourceId, amount, paymentType, coveredTransactionIds, statementPeriodStart, statementPeriodEnd, notes, createdBy, createdAt]
        enums:
          paymentType: [per_transaction, bulk_statement, partial]

    hr_payroll:
      - name: Employee
        fields: [id, userId, employeeNo, position, department, employmentType, hireDate, salary, isActive]
        enums:
          employmentType: [full_time, part_time, contractual]
      - name: LeaveRequest
        fields: [id, employeeId, type, startDate, endDate, status, approvedBy]
        enums:
          type: [vacation, sick, emergency]
          status: [pending, approved, rejected]
      - name: CashAdvance
        fields: [id, employeeId, amount, fundSourceId, isProjectLinked, projectId, purpose, status, approvedBy, releasedAt, createdAt]
        enums:
          status: [pending, approved, released, partially_recovered, fully_recovered]
      - name: CashAdvanceRecovery
        fields: [id, cashAdvanceId, payrollId, amountDeducted, remainingBalance, createdAt]
      - name: Payroll
        fields: [id, periodStart, periodEnd, status]
        enums:
          status: [draft, approved, released]
      - name: Payslip
        fields: [id, payrollId, employeeId, basicPay, "deductions[]", "additions[]", "cashAdvanceDeductions[]", netPay, fundSourceId]

    pos:
      - name: POSSession
        fields: [id, cashierId, openedAt, closedAt, openingCash, closingCash, fundSourceId, status]
        enums:
          status: [open, closed]
      - name: POSSale
        fields: [id, sessionId, customerId, "lineItems[]", subtotal, discount, tax, total, paymentMethod, fundSourceId, receiptNo, createdAt]
      - name: POSSaleItem
        fields: [id, saleId, productId, quantity, unitPrice, lineTotal]

    accounting:
      - name: Account
        fields: [id, code, name, type, balance]
        enums:
          type: [asset, liability, equity, income, expense]
      - name: JournalEntry
        fields: [id, referenceType, referenceId, date, "lines[]", description, createdBy]
      - name: JournalLine
        fields: [id, journalEntryId, accountId, debit, credit]
      - name: TaxRate
        fields: [id, name, percentage, isDefault]
      - name: FiscalYear
        fields: [id, name, startDate, endDate, isClosed]

    support:
      - name: Ticket
        fields: [id, customerId, projectId, subject, description, priority, status, assignedTo, createdAt]
        enums:
          priority: [low, medium, high, critical]
          status: [open, in_progress, resolved, closed]
      - name: TicketComment
        fields: [id, ticketId, authorId, message, isInternal, createdAt]
      - name: TicketAttachment
        fields: [id, ticketId, fileUrl, uploadedAt]

# ─────────────────────────────────────────────────────────────
# CACHE
# ─────────────────────────────────────────────────────────────
cache:
  engine: valkey
  purpose: [bullmq_backend, rate_limiting_store, session_store]
  dev_port: 6379

# ─────────────────────────────────────────────────────────────
# BACKGROUND JOBS
# ─────────────────────────────────────────────────────────────
jobs:
  enabled: true
  engine: bullmq
  backend: valkey
  total_queues: 18
  worker_placement: "packages/jobs (definitions + typed payloads); apps/worker (runtime process)"
  default_retry: 3
  dlq_required: true

  queues:
    - name: tenant-provisioning
      trigger: on_tenant_signup
      description: "Provision PostgreSQL schema t_<slug>, run full ERP migrations, create tenant_super_admin user, send welcome email via Resend"
      retry: 3
      backoff: exponential_from_5s
      dlq: true
      error_path: "retry 3x → DLQ → platform_owner notified; tenant sees 'setup in progress' until DLQ replay"

    - name: tenant-billing
      trigger: daily
      description: "Scan subscriptions ending within 7 days; generate TenantInvoice; send reminders; suspend tenant after grace period; invalidate all sessions; reactivate on payment"
      retry: 3
      backoff: exponential
      dlq: true

    - name: invoice-processing
      trigger: daily
      description: "Scan invoices past dueDate with balance > 0; update status to overdue"
      retry: 3
      dlq: true

    - name: subscription-billing
      trigger: daily
      description: "Generate Draft Invoice 3 days before nextBillingDate; resolve {{month}} {{date}} {{year}} in descriptionTemplate; advance nextBillingDate on publish"
      retry: 3
      backoff: exponential
      dlq: true

    - name: inventory-alerts
      trigger: daily
      description: "Scan products at or below reorderLevel; notify admin and inventory_staff"
      retry: 3
      dlq: true

    - name: goods-receipt
      trigger: on_goods_receipt_save
      description: "Increment stock; activate draft products; write landedUnitCost to costPrice; create ProductPurchaseHistory; trigger cost change alerts"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: payment-processing
      trigger: on_payment_saved
      description: "Update Invoice amountPaid/creditApplied/balance/status; create FundTransaction; post Journal Entry; trigger excess handling prompt if excess detected"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: credit-processing
      trigger: on_customer_credit_transaction_saved
      description: "Update Customer.creditBalance; update CustomerCreditAccount totals (totalCredited, totalUsed, totalRefunded, currentBalance); post Journal Entry; create FundTransaction if advance_payment or credit_refunded"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: expense-processing
      trigger: on_expense_or_project_expense_approved
      description: "Post Journal Entry; deduct BudgetAllocation remainingBalance if applicable; create FundTransaction"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: cash-advance
      trigger: on_cash_advance_approved
      description: "Deduct FundSource; post Journal Entry; create ProjectExpense if isProjectLinked=true (cost visibility only)"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: credit-card-payment
      trigger: on_credit_card_payment_saved
      description: "Deduct paidFromFundSource; reduce outstandingBalance on creditCard FundSource; mark settled transactions as real expenses"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: payroll-processing
      trigger: on_payroll_released
      description: "Create FundTransaction per payslip; deduct total from FundSource; post Journal Entry; payroll release rolled back on failure"
      retry: 3
      dlq: true
      rollback_on_failure: true

    - name: shipping-cost-recalc
      trigger: on_shipping_cost_add_or_update
      description: "Recalculate landedUnitCost for all PO items; trigger cost change alerts if any product costPrice is affected"
      retry: 3
      dlq: true

    - name: mobile-sync
      trigger: on_mobile_client_reconnect
      description: "Receive pending offline AttendanceRecords, task updates, expenses from device; validate; write to server; reject duplicates with conflict error; notify mobile of conflicts"
      retry: 3
      dlq: true

    - name: pdf-generation
      trigger: on_demand
      description: "Generate PDF for Invoice, Proposal, Payslip, PO, Goods Receipt per tenant using React-PDF"
      retry: 3
      dlq: true

    - name: report-export
      trigger: on_demand
      description: "Generate CSV, PDF, or XLSX per module per tenant; streams to storage then returns download URL"
      retry: 3
      dlq: true

    - name: notifications
      trigger: event_driven
      description: "Send emails via Resend + push notifications via Expo Push for all notification events"
      retry: 3
      dlq: true
      critical: false
      notification_events:
        - task_assigned
        - task_status_updated
        - attendance_approved_or_rejected
        - leave_approved_or_rejected
        - expense_approved_or_rejected
        - payroll_released
        - low_stock_alert
        - cost_change_alert
        - credit_balance_changed
        - excess_payment_decision_required

    - name: payroll-reminder
      trigger: monthly
      description: "Remind hr_manager of upcoming payroll period"
      retry: 3
      dlq: true
      critical: false

# ─────────────────────────────────────────────────────────────
# FILE STORAGE
# ─────────────────────────────────────────────────────────────
storage:
  enabled: true
  dev_provider: minio
  prod_provider: cloudflare_r2
  dev_api_port: 9000
  dev_console_port: 9001
  bucket_strategy: single_shared_bucket  # one bucket; tenant isolation via path prefix
  allowed_types:
    - image/jpeg
    - image/png
    - image/webp
    - application/pdf
  max_file_size_mb: 10
  store_originals: true
  image_variants: none
  upload_paths:
    - "<tenant_slug>/receipts/goods-receipt/<id>/<filename>"
    - "<tenant_slug>/receipts/shipping-cost/<id>/<filename>"
    - "<tenant_slug>/receipts/expense/<id>/<filename>"
    - "<tenant_slug>/receipts/cash-advance/<id>/<filename>"
    - "<tenant_slug>/receipts/credit-card-payment/<id>/<filename>"
    - "<tenant_slug>/receipts/credit-refund/<id>/<filename>"
    - "<tenant_slug>/documents/proposals/<id>/<filename>"
    - "<tenant_slug>/tickets/<id>/<filename>"
  mobile_upload:
    mechanism: presigned_url
    offline_fallback: watermelondb  # stored locally; uploaded on reconnect

# ─────────────────────────────────────────────────────────────
# REALTIME
# ─────────────────────────────────────────────────────────────
realtime:
  web:
    mechanism: sse                  # Server-Sent Events via Next.js route handlers
    sse_features:
      - task_dashboard              # assignment + status changes
      - invoice_status_and_balance  # status, balance, creditApplied
      - payment_history             # running balance after each entry
      - customer_credit_balance     # every credit movement
      - pending_excess_decisions    # Sales Dashboard flag
      - dtr_visibility              # clock-in/out visible to approvers
      - dashboard_kpis              # all KPIs
      - inventory_stock             # POS sale + goods receipt
      - banking_fund_balances       # every FundTransaction
      - support_tickets             # agent + customer notifications
      - low_stock_alerts            # triggered at reorderLevel
      - cost_change_alerts          # product repurchase price change
      - budget_remaining_balance    # on expense approval
      - cash_advance_recovery       # on payroll deduction
      - tenant_suspension_notice    # immediate on suspension
  mobile:
    mechanism: react_query_polling  # refetchInterval per screen
    sync_trigger: on_reconnect      # offline queue processed on reconnect

# ─────────────────────────────────────────────────────────────
# EMAIL
# ─────────────────────────────────────────────────────────────
email:
  dev_provider: mailhog
  dev_port: 8025
  prod_provider: resend
  template_engine: react_email

# ─────────────────────────────────────────────────────────────
# PDF / MAPS / EXPORTS
# ─────────────────────────────────────────────────────────────
pdf:
  library: react_pdf                # lighter Docker, pure TypeScript, no headless browser
  documents: [invoice, proposal, payslip, purchase_order, goods_receipt]

maps:
  web: leaflet_openstreetmap        # free, MIT, no API key; used in HR attendance report
  mobile: react_native_maps_openstreetmap

exports:
  formats: [csv, pdf, xlsx]
  libraries:
    csv: native
    pdf: react_pdf
    xlsx: sheetjs

# ─────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────
security:
  layers:
    L1_tenant_scoping:
      mechanism: "Prisma middleware sets PostgreSQL search_path atomically per request from JWT tenantSlug"
      status: always_active
    L2_schema_isolation:
      mechanism: "Separate PostgreSQL schema per tenant; no tenantId columns; schema IS the boundary"
      status: always_active
      note: "Replaces RLS. No RLS policies on tenant ERP entities."
    L3_rbac:
      mechanism: "TypeScript role enum; requireRole middleware on every tRPC procedure; checked before resolver"
      status: always_active
    L4_pool_limits:
      mechanism: "PgBouncer per-tenant connection caps; prevents noisy-neighbor pool exhaustion"
      status: always_active
    L5_audit_log:
      mechanism: "Immutable AuditLog table; every create/update/delete, login/logout, role change, failed login, credit limit change, credit transaction"
      status: always_active
    L6_prisma_guardrails:
      mechanism: "Prisma middleware enforces schema-scoping on every query; prevents cross-schema leaks from bugs"
      status: always_active

  rate_limits:
    auth_endpoints: { limit: 10, window: "1m", key: ip }
    trpc_api: { limit: 120, window: "1m", key: "tenantSlug+userId" }
    file_uploads: { limit: 20, window: "1m", key: userId }
    tenant_signup: { limit: 5, window: "1m", key: ip }
    mobile_sync: { limit: 60, window: "1m", key: userId }

  csrf:
    web: samesite_strict_cookies
    mobile: jwt_in_authorization_header

  cors:
    dev: "http://localhost:3000"
    stage: "https://staging.erp.powerbyte.app"
    prod: "https://erp.powerbyte.app"

  encryption:
    pii_at_rest: true
    mobile_offline: device_keychain_secure_enclave
    passwords: bcrypt

# ─────────────────────────────────────────────────────────────
# DATA GOVERNANCE
# ─────────────────────────────────────────────────────────────
data:
  retention:
    financial_and_credit: "7 years minimum"
    dtr_attendance: "5 years"
    support_tickets: "3 years"
    tenant_schema: "never auto-dropped; manually dropped by platform_owner after retention period"

  gdpr:
    customer_data_exportable: true
    customer_data_deletable: true
    scope: per_tenant

  classification:
    gps_coordinates:
      sensitivity: sensitive
      access: [admin, hr_manager, project_manager, tenant_super_admin]
      note: "never exposed to staff or customer roles"
    salary_payroll:
      sensitivity: highly_sensitive
      access: [hr_manager, accountant, admin, tenant_super_admin]
    credit_data:
      sensitivity: sensitive
      access: [sales_staff, accountant, admin, tenant_super_admin]
      customer_visibility: "own creditBalance only — never creditLimit or other customers"
    financial_records:
      sensitivity: sensitive
      access: "role-restricted per module"

  mobile_offline_data:
    stored: [cached_session, payslip, leave_data, pending_offline_records]
    cleanup: "offline records deleted from device after successful sync; all data wiped on logout or uninstall"

# ─────────────────────────────────────────────────────────────
# MODULES
# ─────────────────────────────────────────────────────────────
modules:
  - name: crm
    url_prefix: "/:slug/erp/crm"
    roles: [sales_staff, accountant, admin, tenant_super_admin]
    sub_routes:
      credit_tab: { roles: [sales_staff, accountant, admin, tenant_super_admin] }

  - name: purchasing
    url_prefix: "/:slug/erp/purchasing"
    roles: [purchasing_staff, admin, tenant_super_admin]
    read_only_for: [inventory_staff]

  - name: inventory
    url_prefix: "/:slug/erp/inventory"
    roles: [inventory_staff, admin, tenant_super_admin]
    read_only_for: [purchasing_staff]

  - name: projects
    url_prefix: "/:slug/erp/projects"
    roles: [project_manager, admin, tenant_super_admin]

  - name: tasks
    url_prefix: "/:slug/erp/tasks"
    roles: [all_tenant_roles_except_customer]
    note: "staff see own tasks only; project_manager can assign to any user"

  - name: dtr
    url_prefix: "/:slug/erp/hr/attendance"
    roles: [hr_manager, admin, project_manager, tenant_super_admin]
    self_service_via_mobile: [staff, project_manager, hr_manager, admin, tenant_super_admin]

  - name: budget
    url_prefix: "/:slug/erp/budget"
    roles: [budget_holder, accountant, admin, tenant_super_admin]
    note: "budget_holder sees own allocation only"

  - name: banking
    url_prefix: "/:slug/erp/banking"
    roles: [accountant, hr_manager, project_manager, admin, tenant_super_admin]

  - name: hr
    url_prefix: "/:slug/erp/hr"
    roles: [hr_manager, admin, tenant_super_admin]

  - name: payroll
    url_prefix: "/:slug/erp/hr/payroll"
    roles: [hr_manager, accountant, admin, tenant_super_admin]

  - name: pos
    url_prefix: "/:slug/pos"
    roles: [cashier, admin, tenant_super_admin]

  - name: accounting
    url_prefix: "/:slug/erp/accounting"
    roles: [accountant, admin, tenant_super_admin]

  - name: support
    url_prefix: "/:slug/erp/support"
    roles: [support_agent, admin, tenant_super_admin]
    read_only_for: [customer_via_portal]

  - name: portal
    url_prefix: "/:slug/portal"
    roles: [customer]
    accessible: [invoices_with_payment_history_and_credit_balance, proposals, project_status, tickets]

  - name: platform_admin
    url_prefix: "/powerbyte-admin"
    roles: [platform_owner]
    features: [tenant_management, plan_management, billing, dlq_replay_ui]

  - name: settings
    url_prefix: "/:slug/erp/settings"
    roles: [admin, tenant_super_admin]

# ─────────────────────────────────────────────────────────────
# NAVIGATION
# ─────────────────────────────────────────────────────────────
navigation:
  strategy: hardcoded_per_role_jwt_filtered
  note: "Menus hardcoded per role enum; filtered at render time from JWT; no DB-driven nav"

# ─────────────────────────────────────────────────────────────
# REPORTING
# ─────────────────────────────────────────────────────────────
reporting:
  platform_dashboard:
    viewer: platform_owner
    kpis:
      - tenants_by_status           # active / trial / suspended / cancelled
      - mrr
      - upcoming_and_overdue_tenant_invoices
      - recent_signups
      - plan_distribution
      - churn_rate
      - dlq_failed_job_count_with_replay_ui
    charts: [bar_mrr_trend, pie_plan_distribution, table_tenant_list]
    exports: [csv, xlsx]

  tenant_dashboard:
    kpis:
      - invoices_awaiting_payment
      - partially_paid_invoices
      - projects_in_progress
      - tasks_not_finished
      - invoice_proposal_status_overview
      - outstanding_past_due_paid_totals
      - active_subscriptions_next_billing
      - budget_allocations_allocated_vs_spent
      - fund_source_balances
      - credit_card_outstanding_per_card
      - pending_excess_payment_decisions
    charts: [bar_revenue_by_period, pie_invoice_status, table]
    exports: none

  module_reports:
    - module: sales
      kpis: [revenue_by_period, top_customers, aging_receivables, partial_payment_tracking, subscription_mrr, customer_credit_balances_summary, pending_excess_decisions]
      charts: [bar, line, table]
      exports: [csv, pdf, xlsx]
    - module: purchasing
      kpis: [po_volume, vendor_spend, landed_vs_raw_cost]
      charts: [bar, table]
      exports: [csv, xlsx]
    - module: inventory
      kpis: [stock_valuation, movement_history, low_stock, vendor_purchase_history]
      charts: [table]
      exports: [csv, xlsx]
    - module: projects
      kpis: [profitability, time_vs_budget, milestone_completion, expenses]
      charts: [bar, table]
      exports: [csv, pdf, xlsx]
    - module: budget
      kpis: [allocation_per_user, spend_by_category, balances]
      charts: [table]
      exports: [csv, xlsx]
    - module: banking
      kpis: [fund_source_ledger, credit_card_transaction_and_settlement_history, cash_flow]
      charts: [table, line]
      exports: [csv, xlsx]
    - module: pos
      kpis: [daily_sales, cash_reconciliation, top_products]
      charts: [bar, table]
      exports: [csv, pdf, xlsx]
    - module: accounting
      kpis: [profit_and_loss, balance_sheet, cash_flow, trial_balance, tax_summary]
      charts: [table]
      exports: [pdf, xlsx]
    - module: hr
      kpis: [attendance_with_gps_map, leave_balance, payroll_cost, cash_advance_recovery]
      charts: [table]
      exports: [csv, xlsx]
      notes: "attendance report includes Leaflet.js map on web for GPS visualization"
    - module: support
      kpis: [ticket_volume, resolution_time, open_by_priority]
      charts: [bar, table]
      exports: [csv]

# ─────────────────────────────────────────────────────────────
# INFRASTRUCTURE
# ─────────────────────────────────────────────────────────────
infrastructure:
  compose:
    network_name: "${APP_NAME}_${ENV}_network"
    startup_script: "deploy/compose/start.sh"
    services:
      dev:
        - name: postgres
          compose_file: docker-compose.db.yml
          image: postgres:16
          note: "Shared PostgreSQL instance; all schemas in one DB; creates shared network"
        - name: pgbouncer
          compose_file: docker-compose.db.yml
          image: bitnami/pgbouncer
        - name: valkey
          compose_file: docker-compose.cache.yml
          image: valkey/valkey:7
          port: 6379
        - name: minio
          compose_file: docker-compose.storage.yml
          image: minio/minio
          ports: [9000, 9001]
        - name: mailhog
          compose_file: docker-compose.infra.yml
          image: mailhog/mailhog
          port: 8025
          dev_only: true
        - name: web
          compose_file: docker-compose.app.yml
          build: apps/web
          port: 3000
        - name: worker
          compose_file: docker-compose.app.yml
          build: apps/worker
      stage:
        services: [postgres, pgbouncer, valkey, minio, web, worker]

  production:
    postgresql: "Railway or Supabase (managed)"
    valkey: "Upstash (managed — eliminates ops overhead)"
    storage: "Cloudflare R2 (S3-compatible, zero egress fees)"
    email: "Resend"
    push_notifications: "Expo Push Notifications (FCM + APNs)"
    hosting: "Railway, Render, or VPS + Docker Compose"

  k8s:
    enabled: false
    scaffold: placeholder_only

# ─────────────────────────────────────────────────────────────
# CI
# ─────────────────────────────────────────────────────────────
ci:
  provider: github_actions
  pipeline_steps:
    - tools_validate_inputs         # governance gate
    - tools_check_env               # governance gate
    - tools_check_product_sync      # governance gate
    - lint
    - typecheck
    - test
    - build
